<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Med Phrases" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Medical Phrases</title>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Medical Phrases</h1>
      <p id="subtitle">карточки для чтения зарубежной литературы</p>
    </div>
    <button id="installBtn" class="ghost hidden">Установить</button>
  </header>

  <main>
    <section class="panel controls">
      <label>
        Книга
        <select id="datasetSelect"></select>
      </label>
      <label>
        Глава / тема
        <select id="chapterSelect"></select>
      </label>
      <label>
        Приоритет
        <select id="prioritySelect">
          <option value="all">Все</option>
          <option value="A">A — сначала</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>
      </label>
      <label>
        Статус
        <select id="statusSelect">
          <option value="all">Все</option>
          <option value="new">Новые</option>
          <option value="repeat">Повторить</option>
          <option value="known">Знаю</option>
        </select>
      </label>
      <label class="search-label">
        Поиск
        <input id="searchInput" type="search" placeholder="например: optic nerve, seizure, gait..." autocomplete="off" />
      </label>
    </section>

    <section class="stats">
      <div><strong id="countShown">0</strong><span>показано</span></div>
      <div><strong id="countKnown">0</strong><span>знаю</span></div>
      <div><strong id="countRepeat">0</strong><span>повторить</span></div>
      <div><strong id="countNew">0</strong><span>новые</span></div>
    </section>

    <section class="card-wrap">
      <article id="flashcard" class="flashcard" tabindex="0" aria-live="polite">
        <div class="card-meta"><span id="cardChapter"></span><span id="cardPriority"></span></div>
        <h2 id="cardPhrase">Загрузка...</h2>
        <div id="cardBack" class="card-back hidden">
          <p id="cardMeaning"></p>
          <p id="cardPattern"></p>
          <p id="cardContext"></p>
        </div>
        <button id="showAnswerBtn" class="primary">Показать перевод</button>
      </article>
      <div class="navrow">
        <button id="prevBtn">← Назад</button>
        <button id="shuffleBtn">Случайно</button>
        <button id="nextBtn">Дальше →</button>
      </div>
      <div class="markrow">
        <button id="repeatBtn" class="warn">Повторить</button>
        <button id="knownBtn" class="ok">Знаю</button>
        <button id="resetBtn" class="ghost">Сбросить статус</button>
      </div>
    </section>

    <section class="panel list-panel">
      <div class="list-head">
        <h3>Таблица фраз</h3>
        <button id="exportBtn" class="ghost">Экспорт прогресса</button>
      </div>
      <div class="table-scroll">
        <table id="phraseTable">
          <thead><tr><th>Фраза</th><th>Перевод</th><th>Глава</th><th>Статус</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <p>Работает офлайн после первой загрузки с HTTPS. Прогресс хранится локально на устройстве.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
